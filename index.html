<!DOCTYPE html>
<html lang="en">
<head>

    <style>

            margin: 0;
            padding: 0;

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        h1 {
            grid-column: 1 / -1;
            text-align: center;
            color: #ffe66d;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .panel-title {
            color: #ffe66d;
            font-size: 1.2em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Canvas area */
        #pendulumCanvas {
            background: #0f0f1a;
            border-radius: 10px;
            display: block;
            width: 100%;
            height: 300px;

            margin-top: 10px;

            font-family: 'Consolas', monospace;

            font-size: 0.9em;

            font-family: 'Consolas', monospace;

            color: #e8e8e8;

        input:focus, textarea:focus {

            min-height: 100px;

            align-items: center;

            margin-bottom: 10px;
            font-size: 0.9em;

        .slider-row {

            align-items: center;

            display: none;
            margin: 15px 0;

        .progress-bar {
            height: 20px;
            background: #2a2a4e;
            border-radius: 10px;
            overflow: hidden;
        }

            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            width: 0%;

            text-align: center;
            font-size: 0.85em;
            color: #4ecdc4;
            margin-top: 5px;

            color: #4ecdc4;
            border-radius: 5px;

        /* File input */

            display: none;

        /* Desktop: viz left, controls+output stacked right */
        .panel-viz {
            grid-row: span 2;
        }
        
        .panel-output {
            padding-top: 15px;

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;

            }
            .panel-viz {

            }
            .panel-output {

<body>
    <div class="container">

            </div>

    <script>
        // ========================================
        // DOUBLE PENDULUM PHYSICS
        // ========================================
        const G = 9.81;
        
        class DoublePendulum {
            constructor(L1, L2, m1, m2, theta1, theta2, omega1, omega2) {
                this.L1 = L1;
                this.L2 = L2;
                this.m1 = m1;
                this.m2 = m2;
                this.state = [theta1, omega1, theta2, omega2];
            }
            
            derivatives(state) {
                const [theta1, omega1, theta2, omega2] = state;
                const { L1, L2, m1, m2 } = this;
                
                const delta = theta2 - theta1;
                const den1 = (m1 + m2) * L1 - m2 * L1 * Math.cos(delta) ** 2;
                const den2 = (L2 / L1) * den1;
                
                const alpha1 = (m2 * L1 * omega1**2 * Math.sin(delta) * Math.cos(delta) +
                               m2 * G * Math.sin(theta2) * Math.cos(delta) +
                               m2 * L2 * omega2**2 * Math.sin(delta) -
                               (m1 + m2) * G * Math.sin(theta1)) / den1;
                
                const alpha2 = (-m2 * L2 * omega2**2 * Math.sin(delta) * Math.cos(delta) +
                               (m1 + m2) * G * Math.sin(theta1) * Math.cos(delta) -
                               (m1 + m2) * L1 * omega1**2 * Math.sin(delta) -
                               (m1 + m2) * G * Math.sin(theta2)) / den2;
                
                return [omega1, alpha1, omega2, alpha2];
            }
            
            // RK4 integration
            step(dt) {
                const state = this.state;
                const k1 = this.derivatives(state);
                const k2 = this.derivatives(state.map((s, i) => s + k1[i] * dt / 2));
                const k3 = this.derivatives(state.map((s, i) => s + k2[i] * dt / 2));
                const k4 = this.derivatives(state.map((s, i) => s + k3[i] * dt));
                
                this.state = state.map((s, i) => 
                    s + (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]) * dt / 6
                );
            }
            
            getPositions(scale = 70) {
                const [theta1, , theta2] = this.state;
                const x1 = this.L1 * Math.sin(theta1) * scale;
                const y1 = this.L1 * Math.cos(theta1) * scale;
                const x2 = x1 + this.L2 * Math.sin(theta2) * scale;
                const y2 = y1 + this.L2 * Math.cos(theta2) * scale;
                return { x1, y1, x2, y2 };
            }
            
            getStateBytes() {
                const buffer = new ArrayBuffer(32);
                const view = new Float64Array(buffer);
                view[0] = this.state[0];
                view[1] = this.state[1];
                view[2] = this.state[2];
                view[3] = this.state[3];
                return new Uint8Array(buffer);
            }
        }
        
        // ========================================
        // CRYPTO UTILITIES
        // ========================================
        async function sha512(data) {
            const buffer = typeof data === 'string'
                ? new TextEncoder().encode(data) 
                : data;
            const hashBuffer = await crypto.subtle.digest('SHA-512', buffer);
            return new Uint8Array(hashBuffer);
        }
        
        async function sha256(data) {
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return new Uint8Array(hashBuffer);
        }
        
        function bytesToHex(bytes) {
            return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function hexToBytes(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < bytes.length; i++) {
                bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
            }
            return bytes;
        }
        
        // Base64 encoding/decoding
        function bytesToBase64(bytes) {
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }
        
        function base64ToBytes(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }
        
        // Compression using pako (zlib)
        function compress(data) {
            return pako.deflate(data);
        }
        
        function decompress(data) {
            return pako.inflate(data);
        }
        
        // ========================================
        // BIP39 WORD ENCODING
        // ========================================
        let BIP39_WORDS = null;
        
        async function loadBIP39Words() {
            if (BIP39_WORDS) return BIP39_WORDS;
            const resp = await fetch('https://raw.githubusercontent.com/bitcoin/bips/master/bip-0039/english.txt');
            const text = await resp.text();
            BIP39_WORDS = text.trim().split('\n');
            return BIP39_WORDS;
        }
        
        async function bytesToWords(bytes) {
            const words = await loadBIP39Words();
            // Convert bytes to 11-bit chunks (BIP39 style)
            let bits = '';
            for (const b of bytes) {
                bits += b.toString(2).padStart(8, '0');
            }
            // Pad to multiple of 11
            while (bits.length % 11 !== 0) {
                bits += '0';
            }
            const result = [];
            for (let i = 0; i < bits.length; i += 11) {
                const index = parseInt(bits.slice(i, i + 11), 2);
                result.push(words[index]);
            }
            return result.join(' ');
        }
        
        async function wordsToBytes(wordString) {
            const words = await loadBIP39Words();
            const wordList = wordString.trim().toLowerCase().split(/\s+/);
            let bits = '';
            for (const w of wordList) {
                const index = words.indexOf(w);
                if (index === -1) throw new Error(`Unknown word: ${w}`);
                bits += index.toString(2).padStart(11, '0');
            }
            // Convert bits back to bytes (drop padding)
            const byteCount = Math.floor(bits.length / 8);
            const bytes = new Uint8Array(byteCount);
            for (let i = 0; i < byteCount; i++) {
                bytes[i] = parseInt(bits.slice(i * 8, i * 8 + 8), 2);
            }
            return bytes;
        }
        
        function getOutputFormat() {
            return document.querySelector('input[name="outputFormat"]:checked')?.value || 'base64';
        }
        
        // ========================================
        // DOUBLE PENDULUM ENCRYPTION
        // ========================================
        class PendulumCipher {
            constructor(key) {
                this.key = key;
                this.pendulum1 = null;
                this.pendulum2 = null;
                this.time = 0;
                this.dt = 0.001;
            }
            
            async initialize() {
                const keyBytes = await sha512(this.key);
                
                const bytesToFloat = (b1, b2) => ((b1 << 8) | b2) / 65536;
                
                const params = [];
                for (let i = 0; i < 16; i++) {
                    params.push(bytesToFloat(keyBytes[i*2], keyBytes[i*2 + 1]));
                }
                
                // Pendulum 1
                this.pendulum1 = new DoublePendulum(
                    0.8 + params[0] * 0.8,
                    0.8 + params[1] * 0.8,
                    0.5 + params[2] * 1.5,
                    0.5 + params[3] * 1.5,
                    Math.PI * (0.2 + params[4] * 0.6),
                    Math.PI * (0.2 + params[5] * 0.6),
                    (params[6] - 0.5) * 2.0,
                    (params[7] - 0.5) * 2.0
                );
                
                // Pendulum 2
                this.pendulum2 = new DoublePendulum(
                    0.8 + params[8] * 0.8,
                    0.8 + params[9] * 0.8,
                    0.5 + params[10] * 1.5,
                    0.5 + params[11] * 1.5,
                    Math.PI * (0.2 + params[12] * 0.6),
                    Math.PI * (0.2 + params[13] * 0.6),
                    (params[14] - 0.5) * 2.0,
                    (params[15] - 0.5) * 2.0
                );
                
                this.time = 0;
            }
            
            stepAnimation(dt = 0.02) {
                this.pendulum1.step(dt);
                this.pendulum2.step(dt);
                this.time += dt;
            }
            
            async generateKeystreamBlock() {
                this.pendulum1.step(this.dt);
                this.pendulum2.step(this.dt);
                this.time += this.dt;
                
                const state1 = this.pendulum1.getStateBytes();
                const state2 = this.pendulum2.getStateBytes();
                const timeBytes = new Uint8Array(new Float64Array([this.time]).buffer);
                
                const combined = new Uint8Array(state1.length + state2.length + timeBytes.length);
                combined.set(state1, 0);
                combined.set(state2, state1.length);
                combined.set(timeBytes, state1.length + state2.length);
                
                return await sha256(combined);
            }
            
            async generateKeystream(length) {
                const stream = new Uint8Array(length);
                let offset = 0;
                
                while (offset < length) {
                    const block = await this.generateKeystreamBlock();
                    const remaining = length - offset;
                    const toCopy = Math.min(remaining, block.length);
                    stream.set(block.slice(0, toCopy), offset);
                    offset += toCopy;
                }
                
                return stream;
            }
            
            async encrypt(plaintext) {
                const keystream = await this.generateKeystream(plaintext.length);
                const ciphertext = new Uint8Array(plaintext.length);
                for (let i = 0; i < plaintext.length; i++) {
                    ciphertext[i] = plaintext[i] ^ keystream[i];
                }
                return ciphertext;
            }
            
            async decrypt(ciphertext) {
                return this.encrypt(ciphertext); // XOR is symmetric
            }
        }
        
        // ========================================
        // UI CONTROLLER
        // ========================================
        class PendulumCipherUI {
            constructor() {
                this.canvas = document.getElementById('pendulumCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.cipher = null;
                this.animating = false;
                this.animationSteps = 0;
                this.targetSteps = 180;
                this.pendingData = null;
                this.pendingMode = null;
                this.fileMode = null;
                
                this.setupCanvas();
                this.bindEvents();
                this.drawIdleCanvas();
            }
            
            setupCanvas() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width - 40;
                this.canvas.height = 300;
            }
            
            bindEvents() {
                document.getElementById('keyInput').addEventListener('input', () => this.onKeyChange());
                document.getElementById('showKey').addEventListener('change', (e) => {
                    document.getElementById('keyInput').type = e.target.checked ? 'text' : 'password';
                });
                
                document.getElementById('stepsSlider').addEventListener('input', (e) => {
                    document.getElementById('stepsValue').textContent = e.target.value;
                });
                
                document.getElementById('encryptBtn').addEventListener('click', () => this.encrypt());
                document.getElementById('decryptBtn').addEventListener('click', () => this.decrypt());
                document.getElementById('copyBtn').addEventListener('click', () => this.copyOutput());
                
                document.getElementById('encryptFileBtn').addEventListener('click', () => this.startFileOperation('encrypt'));
                document.getElementById('decryptFileBtn').addEventListener('click', () => this.startFileOperation('decrypt'));
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileSelect(e));
                
                window.addEventListener('resize', () => this.setupCanvas());
            }
            
            setStatus(text) {
                document.getElementById('statusBar').textContent = text;
            }
            
            setKeystream(text) {
                document.getElementById('keystreamDisplay').textContent = text || '—';
            }
            
            setControls(enabled) {
                const controls = ['keyInput', 'stepsSlider', 'inputText', 'encryptBtn', 
                                 'decryptBtn', 'encryptFileBtn', 'decryptFileBtn'];
                controls.forEach(id => {
                    document.getElementById(id).disabled = !enabled;
                });
            }
            
            showProgress(show) {
                document.getElementById('progressContainer').classList.toggle('active', show);
            }
            
            setProgress(percent, text) {
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('progressText').textContent = text;
            }
            
            drawIdleCanvas() {
                const { width, height } = this.canvas;
                this.ctx.fillStyle = '#0f0f1a';
                this.ctx.fillRect(0, 0, width, height);
                
                this.ctx.fillStyle = '#444466';
                this.ctx.font = '16px Segoe UI';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('Enter a key to see', width / 2, height / 2 - 10);
                this.ctx.fillText('the pendulums', width / 2, height / 2 + 15);
            }
            
            drawPendulums() {
                if (!this.cipher) return;
                
                const { width, height } = this.canvas;
                this.ctx.fillStyle = '#0f0f1a';
                this.ctx.fillRect(0, 0, width, height);
                
                const origin1 = { x: width / 3, y: height / 3 };
                const origin2 = { x: 2 * width / 3, y: height / 3 };
                
                // Labels
                this.ctx.font = 'bold 12px Segoe UI';
                this.ctx.textAlign = 'center';
                this.ctx.fillStyle = '#ff6b6b';
                this.ctx.fillText('Pendulum 1', origin1.x, 25);
                this.ctx.fillStyle = '#4ecdc4';
                this.ctx.fillText('Pendulum 2', origin2.x, 25);
                
                // Draw pendulums
                this.drawSinglePendulum(origin1, this.cipher.pendulum1, '#ff6b6b', '#ffaaaa');
                this.drawSinglePendulum(origin2, this.cipher.pendulum2, '#4ecdc4', '#aaffee');
            }
            
            drawSinglePendulum(origin, pendulum, color1, color2) {
                const pos = pendulum.getPositions(70);
                const ctx = this.ctx;
                
                // Arms
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(origin.x, origin.y);
                ctx.lineTo(origin.x + pos.x1, origin.y + pos.y1);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(origin.x + pos.x1, origin.y + pos.y1);
                ctx.lineTo(origin.x + pos.x2, origin.y + pos.y2);
                ctx.stroke();
                
                // Pivot
                ctx.fillStyle = '#444466';
                ctx.beginPath();
                ctx.arc(origin.x, origin.y, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Bob 1
                ctx.fillStyle = color1;
                ctx.beginPath();
                ctx.arc(origin.x + pos.x1, origin.y + pos.y1, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Bob 2
                ctx.fillStyle = color2;
                ctx.beginPath();
                ctx.arc(origin.x + pos.x2, origin.y + pos.y2, 12, 0, Math.PI * 2);
                ctx.fill();
            }
            
            async onKeyChange() {
                const key = document.getElementById('keyInput').value;
                if (key) {
                    this.cipher = new PendulumCipher(key);
                    await this.cipher.initialize();
                    this.drawPendulums();
                    this.setStatus(`Key loaded: ${key.length} characters`);
                } else {
                    this.cipher = null;
                    this.drawIdleCanvas();
                    this.setStatus('Enter a key to initialize pendulums');
                }
            }
            
            async encrypt() {
                const key = document.getElementById('keyInput').value;
                if (!key) {
                    alert('Please enter an encryption key');
                    return;
                }
                
                const plaintext = document.getElementById('inputText').value.trim();
                if (!plaintext) {
                    alert('Please enter text to encrypt');
                    return;
                }
                
                // Compress plaintext before encryption
                const textBytes = new TextEncoder().encode(plaintext);
                const compressed = compress(textBytes);
                
                this.pendingSteps = parseInt(document.getElementById('stepsSlider').value);
                this.targetSteps = this.pendingSteps;  // Animation matches actual warmup steps
                
                // Do all calculation synchronously first (deterministic)
                const result = await this.runCalculation(key, compressed, 'encrypt');
                
                // Store result for display after animation
                this.pendingResult = result;
                this.pendingMode = 'encrypt';
                
                // Now play the animation (purely visual replay)
                this.playAnimation(key);
            }
            
            async decrypt() {
                const key = document.getElementById('keyInput').value;
                if (!key) {
                    alert('Please enter an encryption key');
                    return;
                }
                
                const ciphertextInput = document.getElementById('inputText').value.trim();
                if (!ciphertextInput) {
                    alert('Please enter ciphertext to decrypt');
                    return;
                }
                
                // Auto-detect format: if it contains spaces and lowercase words, it's likely word format
                const looksLikeWords = /^[a-z]+(\s+[a-z]+)+$/i.test(ciphertextInput);
                
                let data;
                try {
                    if (looksLikeWords) {
                        data = await wordsToBytes(ciphertextInput);
                    } else {
                        data = base64ToBytes(ciphertextInput);
                    }
                } catch (e) {
                    alert('Invalid format: ' + e.message);
                    return;
                }
                
                this.pendingSteps = parseInt(document.getElementById('stepsSlider').value);
                this.targetSteps = this.pendingSteps;  // Animation matches actual warmup steps
                
                // Do all calculation synchronously first (deterministic)
                const decrypted = await this.runCalculation(key, data, 'decrypt');
                
                // Decompress the decrypted data
                let result;
                try {
                    result = decompress(decrypted);
                } catch (e) {
                    alert('Decryption failed - wrong key or steps?');
                    return;
                }
                
                // Store result for display after animation
                this.pendingResult = result;
                this.pendingMode = 'decrypt';
                
                // Now play the animation (purely visual replay)
                this.playAnimation(key);
            }
            
            async runCalculation(key, data, mode) {
                // ========================================
                // CHAOS-BASED ENCRYPTION
                // ========================================
                const warmupSteps = parseInt(document.getElementById('stepsSlider').value);
                const WARMUP_DT = 0.02;
                
                const cipher = new PendulumCipher(key);
                await cipher.initialize();
                
                // Warmup: let chaos develop
                for (let i = 0; i < warmupSteps; i++) {
                    cipher.pendulum1.step(WARMUP_DT);
                    cipher.pendulum2.step(WARMUP_DT);
                    cipher.time += WARMUP_DT;
                }
                
                // Generate keystream
                const keystream = await cipher.generateKeystream(data.length);
                
                // DEBUG: Log first 16 bytes of keystream
                console.log('First 16 keystream bytes:', bytesToHex(keystream.slice(0, 16)));
                console.log('==================');
                
                // XOR to encrypt/decrypt
                const result = new Uint8Array(data.length);
                for (let i = 0; i < data.length; i++) {
                    result[i] = data[i] ^ keystream[i];
                }
                
                return result;
            }
            
            async playAnimation(key) {
                // Create a SEPARATE cipher just for visual animation
                // This doesn't affect the already-computed result
                this.cipher = new PendulumCipher(key);
                await this.cipher.initialize();
                
                this.setControls(false);
                this.showProgress(true);
                this.animationSteps = 0;
                this.animating = true;
                
                this.animateVisual();
            }
            
            animateVisual() {
                if (!this.animating) return;
                
                // Step the visual pendulums
                this.cipher.pendulum1.step(0.02);
                this.cipher.pendulum2.step(0.02);
                this.cipher.time += 0.02;
                this.animationSteps++;
                
                // Update display
                this.drawPendulums();
                
                // Generate and show evolving keystream every 10 frames
                if (this.animationSteps % 10 === 0) {
                    this.updateKeystreamPreview();
                }
                
                const progress = Math.min(this.animationSteps / this.targetSteps, 1);
                this.setProgress(progress * 100, `Warming up chaos... ${Math.round(progress * 100)}%`);
                
                if (this.animationSteps < this.targetSteps) {
                    requestAnimationFrame(() => this.animateVisual());
                } else {
                    this.animating = false;
                    this.showResult();
                }
            }
            
            async updateKeystreamPreview() {
                // Get current pendulum states and hash them
                const state1 = this.cipher.pendulum1.getStateBytes();
                const state2 = this.cipher.pendulum2.getStateBytes();
                const timeBytes = new Uint8Array(new Float64Array([this.cipher.time]).buffer);
                
                const combined = new Uint8Array(state1.length + state2.length + timeBytes.length);
                combined.set(state1, 0);
                combined.set(state2, state1.length);
                combined.set(timeBytes, state1.length + state2.length);
                
                const hash = await sha256(combined);
                const preview = bytesToHex(hash.slice(0, 16));
                this.setKeystream(preview + '...');
            }
            
            async showResult() {
                // Display the pre-computed result
                if (this.pendingMode === 'encrypt') {
                    const format = getOutputFormat();
                    let output;
                    if (format === 'words') {
                        output = await bytesToWords(this.pendingResult);
                    } else {
                        output = bytesToBase64(this.pendingResult);
                    }
                    document.getElementById('outputText').value = output;
                    const preview = output.slice(0, 48) + (output.length > 48 ? '...' : '');
                    this.setKeystream(preview);
                    this.setStatus(`✓ Encrypted & compressed (${this.pendingSteps} steps, ${format})`);
                    
                } else if (this.pendingMode === 'decrypt') {
                    let output;
                    try {
                        output = new TextDecoder().decode(this.pendingResult);
                    } catch {
                        output = '[Binary data - cannot display as text]';
                    }
                    document.getElementById('outputText').value = output;
                    this.setKeystream(`(decrypted & decompressed)`);
                    this.setStatus(`✓ Decrypted & decompressed (${this.pendingSteps} steps)`);
                    
                } else if (this.pendingMode === 'encrypt-file') {
                    this.downloadFile(this.pendingResult, this.pendingFilename + '.enc');
                    this.setStatus(`✓ Encrypted file: ${this.pendingResult.length.toLocaleString()} bytes (${this.pendingSteps} steps)`);
                    
                } else if (this.pendingMode === 'decrypt-file') {
                    const filename = this.pendingFilename.replace('.enc', '') || 'decrypted';
                    this.downloadFile(this.pendingResult, filename);
                    this.setStatus(`✓ Decrypted file: ${this.pendingResult.length.toLocaleString()} bytes (${this.pendingSteps} steps)`);
                }
                
                this.setControls(true);
                this.showProgress(false);
            }
            
            copyOutput() {
                const output = document.getElementById('outputText');
                output.select();
                document.execCommand('copy');
                this.setStatus('✓ Copied to clipboard!');
            }
            
            startFileOperation(mode) {
                this.fileMode = mode;
                document.getElementById('fileInput').click();
            }
            
            async handleFileSelect(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const key = document.getElementById('keyInput').value;
                if (!key) {
                    alert('Please enter an encryption key');
                    return;
                }
                
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                const filename = file.name;
                
                this.pendingSteps = parseInt(document.getElementById('stepsSlider').value);
                this.targetSteps = this.pendingSteps;  // Animation matches actual warmup steps
                
                // Do all calculation synchronously first (deterministic)
                const result = await this.runCalculation(key, data, this.fileMode);
                
                // Store result for download after animation
                this.pendingResult = result;
                this.pendingFilename = filename;
                this.pendingMode = this.fileMode + '-file';
                
                // Now play the animation (purely visual replay)
                this.playAnimation(key);
                
                event.target.value = '';
            }
            
            downloadFile(data, filename) {
                const blob = new Blob([data], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        // Initialize
        const ui = new PendulumCipherUI();
    </script>
